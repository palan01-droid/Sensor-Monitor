<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>Authenticating… — SensorMonitor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 14px; color: #8b949e; }
</style>
</head>
<body>
<div class="spinner"></div>
<p>Completing sign in…</p>

<script>
(async () => {
  const sb = supabase.createClient('{{ supabase_url }}', '{{ supabase_anon_key }}');

  // Supabase JS automatically processes the hash/code on getSession()
  const { data: { session }, error } = await sb.auth.getSession();

  if (error || !session) {
    window.location.href = '/login?error=' + encodeURIComponent(error?.message || 'OAuth sign in failed');
    return;
  }

  const resp = await fetch('/auth/session', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content,
    },
    body: JSON.stringify({ access_token: session.access_token }),
  });

  if (resp.ok) {
    window.location.href = '/dashboard';
  } else {
    window.location.href = '/login?error=session_failed';
  }
})();
</script>
</body>
</html>
