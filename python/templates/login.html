<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>Sign In — SensorMonitor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --danger: #f85149;
    --success: #3fb950;
    --input-bg: #0d1117;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #1d4ed8 0%, transparent 70%);
    top: -150px; left: -150px;
    opacity: 0.18;
    animation: drift1 12s ease-in-out infinite;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
    bottom: -100px; right: -100px;
    opacity: 0.15;
    animation: drift2 14s ease-in-out infinite;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #0e7490 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.08;
    animation: drift3 10s ease-in-out infinite;
  }
  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,-40px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,30px)} }
  @keyframes drift3 { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-45%,-55%)} }

  /* Grid overlay */
  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(48,54,61,0.25) 1px, transparent 1px),
      linear-gradient(90deg, rgba(48,54,61,0.25) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .card {
    background: rgba(22, 27, 34, 0.85);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(88,166,255,0.05);
    animation: card-in 0.4s ease;
  }
  @keyframes card-in { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;
  }
  .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #1d4ed8, #7c3aed);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .brand-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 28px;
  }

  .error-msg {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.4);
    color: var(--danger);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 18px;
    display: none;
  }
  .error-msg.show { display: block; }

  .success-msg {
    background: rgba(63,185,80,0.1);
    border: 1px solid rgba(63,185,80,0.4);
    color: var(--success);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 18px;
    display: none;
  }
  .success-msg.show { display: block; }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .field input::placeholder { color: #484f58; }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
  }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
    margin-top: 4px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span { font-size: 12px; color: var(--muted); }

  .google-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, border-color 0.2s;
    font-family: inherit;
    font-weight: 500;
  }
  .google-btn:hover { background: rgba(255,255,255,0.05); border-color: #484f58; }
  .google-btn svg { flex-shrink: 0; }

  .switch {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 22px;
  }
  .switch a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .switch a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-overlay"></div>

<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">⬡</div>
      <span class="brand-name">SensorMonitor</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your dashboard</p>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" id="submit-btn" class="submit-btn">Sign In</button>
    </form>

    <div class="divider"><span>or</span></div>

    <button id="google-btn" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <p class="switch">Don't have an account? <a href="/signup">Sign up</a></p>
  </div>
</div>

<script>
const SUPABASE_URL = '{{ supabase_url }}';
const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';

if (!SUPABASE_URL) {
  document.getElementById('error-msg').textContent =
    'Auth is not configured — set SUPABASE_URL and SUPABASE_ANON_KEY to enable login.';
  document.getElementById('error-msg').classList.add('show');
  document.getElementById('login-form').style.opacity = '0.4';
  document.getElementById('login-form').style.pointerEvents = 'none';
  document.getElementById('google-btn').style.display = 'none';
}

const sb = supabase.createClient(SUPABASE_URL || 'https://placeholder.supabase.co', SUPABASE_ANON_KEY || 'placeholder');

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-msg').classList.remove('show');
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    showError(error.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }

  const resp = await fetch('/auth/session', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content,
    },
    body: JSON.stringify({ access_token: data.session.access_token }),
  });

  if (resp.ok) {
    window.location.href = '/dashboard';
  } else {
    const err = await resp.json();
    showError(err.error || 'Login failed');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

document.getElementById('google-btn').addEventListener('click', async () => {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: `${window.location.origin}/auth/callback` },
  });
});

// Show error from URL params (e.g. OAuth failure)
const params = new URLSearchParams(window.location.search);
if (params.get('error')) showError(decodeURIComponent(params.get('error')));
</script>
</body>
</html>
